<!DOCTYPE html>
<html lang="ru">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энергетический Инкрементал</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main-layout">
        
        <!-- БОКОВАЯ ПАНЕЛЬ С ВКЛАДКАМИ -->
        <div id="tabs-sidebar">
            <button class="tab-button active" data-tab="energy">Энергия</button>
            <button class="tab-button" data-tab="automation">Автоматика</button>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <div id="main-content">
            
            <div id="tab-content">
                
                <!-- ВКЛАДКА "ЭНЕРГИЯ" -->
                <div id="tab-energy" class="tab-panel active">
                    <div id="energy-display">
                        У вас <span id="energy-amount">0.0</span> Энергии
                    </div>
                    
                    <hr id="separator">

                    <div id="energy-upgrades">
                        <p class="upgrade-title">Покупка улучшений:</p>

                        <div class="upgrades-grid">
                            <!-- Улучшение 1 -->
                            <div class="upgrade-item">
                                <button class="buy-button" id="prod-upgrade-btn">*10 Э / сек.</button>
                                <div class="upgrade-info">
                                    Цена: <span id="prod-price">1</span> Э | Следующая: <span id="prod-next-price">15</span> Э <span class="multiplier-hint">(*15)</span>
                                </div>
                                <div class="upgrade-hint">Увеличивает производство в 10 раз</div>
                            </div>

                            <!-- Улучшение 2 -->
                            <div class="upgrade-item">
                                <button class="buy-button" id="interval-upgrade-btn">Уменьшить интервал на 5% (<span id="interval-count">0</span>/10)</button>
                                <div class="upgrade-info">
                                    Цена: <span id="interval-price">5</span> Э | Следующая: <span id="interval-next-price">20</span> Э <span class="multiplier-hint">(*20)</span>
                                </div>
                                <div class="upgrade-hint">Уменьшает интервал между тиками на 5% (макс. 10 раз)</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ВКЛАДКА "АВТОМАТИКА" -->
                <div id="tab-automation" class="tab-panel">
                    <p id="automation-message">
                        <span class="red-accent">[А1]</span> 
                        <span id="auto-text">вы получаете <span class="energy-gold">+0.1 Э</span> / 1.0 с</span>
                    </p>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
